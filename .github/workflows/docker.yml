name: Build and Push Backend Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ github.event_name == 'pull_request' && '(PR - no push)' || '' }}
    runs-on: [self-hosted, bastion, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 使用 bastion 本機的 docker driver，可直接存取 mirror-registry
          driver: docker

      - name: Login to mirror-registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_HOST }}/ocp-automation/ocp-automation-backend
          tags: |
            # push main → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # push tag v1.2.3 → :1.2.3 + :1.2 + :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # PR → :pr-123（方便 review，但不會 push）
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit secret：GIT_CLONE_PAT 從 GitHub Secrets 讀取
          # token 只存在於 build 的 tmpfs，不會進入任何 image layer
          secrets: |
            git_pat=${{ secrets.GIT_CLONE_PAT }}
          # Registry cache：加速重複 build（PR 時只讀 cache，不寫）
          cache-from: type=registry,ref=${{ secrets.REGISTRY_HOST }}/ocp-automation/ocp-automation-backend:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/ocp-automation/ocp-automation-backend:buildcache,mode=max', secrets.REGISTRY_HOST) || '' }}

      - name: Smoke test（PR only）
        if: github.event_name == 'pull_request'
        run: |
          IMAGE=$(echo '${{ steps.meta.outputs.tags }}' | head -1)
          docker run --rm --entrypoint python "$IMAGE" -c "import main; print('import OK')"

      - name: Logout
        if: always() && github.event_name != 'pull_request'
        run: docker logout ${{ secrets.REGISTRY_HOST }}
